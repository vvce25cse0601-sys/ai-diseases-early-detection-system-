<!DOCTYPE html>
<html>
<head>
    <style>
        /* CSS: This part handles the colors and "Farmer-Friendly" green theme */
        body { 
            background-color: #f4f9f4; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #2ecc71; /* Green border */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #27ae60; text-align: center; }
        .btn {
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Paddy AI Dashboard</h1>
        <p>Welcome! This system uses AI to detect crop diseases early.</p>
        
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn">Start New Scan</button>
        </div>
    </div>
    <style>
    /* 1. Force the background to be white/light grey */
    html, body {
        background-color: #f4f9f4 !important;
        color: #000000 !important; /* Forces black text if green fails */
    }

    /* 2. Target the specific Dashboard box to make it "Pop" */
    .container, .card, .main-box {
        background-color: #ffffff !important;
        border: 3px solid #2ecc71 !important;
        color: #1b4d1b !important; /* Dark green text */
        display: block !important;
        visibility: visible !important;
    }

    /* 3. Ensure all text inside the dashboard is dark */
    h1, h2, h3, p, div, span {
        color: #1b4d1b !important;
        opacity: 1 !important;
    }

    /* 4. Fix the button visibility */
    .btn, button {
        background-color: #2ecc71 !important;
        color: white !important;
        font-weight: bold !important;
        padding: 15px 30px !important;
        display: inline-block !important;
    }
</style>
</body>
</html>
