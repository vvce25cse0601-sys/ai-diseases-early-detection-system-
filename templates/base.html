<!DOCTYPE html>
<html>
<head>
    <style>
        /* CSS: This part handles the colors and "Farmer-Friendly" green theme */
        body { 
            background-color: #f4f9f4; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #2ecc71; /* Green border */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #27ae60; text-align: center; }
        .btn {
            background-color: #2ecc71;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Paddy AI Dashboard</h1>
        <p>Welcome! This system uses AI to detect crop diseases early.</p>
        
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn">Start New Scan</button>
        </div>
    </div>
</body>
</html>
