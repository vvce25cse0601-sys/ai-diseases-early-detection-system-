<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Paddy AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="header">
        <h1>{% block header_title %}Smart Paddy AI{% endblock %}</h1>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="bottom-nav">
        <a href="{{ url_for('home') }}" class="nav-item {% if request.path == '/' %}active{% endif %}">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="{{ url_for('monitoring') }}" class="nav-item {% if request.path == '/monitoring' %}active{% endif %}">
            <i class="fas fa-camera"></i>
            <span>Monitor</span>
        </a>
        <a href="{{ url_for('alerts') }}" class="nav-item {% if request.path == '/alerts' %}active{% endif %}">
            <i class="fas fa-bell"></i>
            <span>Alerts</span>
        </a>
        <a href="{{ url_for('settings') }}" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
        </a>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
